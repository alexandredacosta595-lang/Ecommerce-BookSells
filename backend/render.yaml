services:
  - type: web
    name: mulemba-backend
    env: docker
    dockerfilePath: ./Dockerfile
    plan: free
    disk:
      name: uploads-disk
      mountPath: /data/uploads
      sizeGB: 1
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_USER
        sync: false
      - key: DATABASE_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false
      - key: UPLOAD_DIR
        value: /data/uploads/
