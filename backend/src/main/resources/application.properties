# MYSQL / POSTGRES CONFIGURATION (Render / Neon)
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/livraria}
spring.datasource.username=${DATABASE_USER:postgres}
spring.datasource.password=${DATABASE_PASSWORD:logaritmo@2024}

spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.generate-ddl=true
spring.jpa.show-sql=true
